name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

# A new push should supersede the still-running review of the old head.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # claude-code-action is called directly (rather than via the
      # drillan/claude-pr-reviewer wrapper) so we control the whole prompt
      # and can see Claude's output in the run log. In CI every tool call
      # not matched by --allowedTools is silently denied, so the tool list
      # must cover everything the prompt asks for: Task for the
      # pr-review-toolkit agents, git for reading history, Write so the
      # comment body can go through --body-file instead of shell quoting
      # (command substitution in --body "$(...)" is auto-denied), and the
      # mcp__github_inline_comment tool, which claude-code-action only
      # installs when it appears in allowedTools.
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          plugin_marketplaces: |
            https://github.com/anthropics/claude-code.git
          plugins: |
            pr-review-toolkit@claude-code-plugins
          claude_args: |
            --model claude-sonnet-5
            --allowedTools "Task,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Read,Grep,Glob,Write,TodoWrite,mcp__github_inline_comment__create_inline_comment"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this PR comprehensively.
            Use the pr-review-toolkit agents to check:
            - Code quality and style (code-reviewer)
            - Test coverage (pr-test-analyzer)
            - Error handling (silent-failure-hunter)
            - Type design (type-design-analyzer)
            - Comment accuracy (comment-analyzer)

            This is a headless one-shot run: the process exits the moment
            you end your turn, killing any background work. Launch every
            agent with run_in_background: false and wait for its result.
            Never end your turn before the summary comment below has been
            posted — if agents fail or time out, post the summary anyway
            with whatever findings you have.

            Before reviewing, list this PR's review threads:

            gh api graphql -f query='
              query {
                repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                  pullRequest(number: ${{ github.event.pull_request.number }}) {
                    reviewThreads(first: 100) {
                      nodes { id path line isResolved isOutdated
                        comments(last: 10) { nodes { body createdAt author { login } } }
                      }
                    }
                  }
                }
              }'

            For each unresolved thread authored by any bot account
            (login ending in "[bot]" — treat all of these as this bot's
            own threads): if its last bot reply starts with "✅ Fixed", or
            no commit since that thread's last comment touched the
            relevant part of its file, skip it. Otherwise reply once,
            stating whether the flagged issue is now fixed (start with
            "✅ Fixed —" and cite the commit), partially fixed, or still
            present despite the changes.

            Never resolve threads. Read human-authored threads for
            context only. Then review the new/changed code as usual,
            without opening new threads for issues already tracked in
            existing ones.

            Post each new finding on a specific code line with the
            mcp__github_inline_comment__create_inline_comment tool.

            Finish with a summary comment. Write the comment body to a
            file and post it with
            `gh pr comment --edit-last --create-if-none --body-file <file>`
            so there is only ever one summary, updated in place on each
            push, and no shell-quoting problems. It must contain:

            1. A short summary of what the PR does, plus a risk level
               (low / medium / high) with a one-line justification.
            2. "Remaining issues": a checkbox list with one item per
               finding — "- [ ]" while open, "- [x]" once fixed —
               covering both existing review threads and this review's
               new findings. If nothing is open, say so.

            Write all reviews in English.
