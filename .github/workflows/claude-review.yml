name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: drillan/claude-pr-reviewer@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_model: claude-sonnet-5
          allowed_tools: "Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Read,Grep,Glob"
          custom_prompt: |
            Before reviewing, list this PR's review threads:

            gh api graphql -f query='
              query {
                repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                  pullRequest(number: ${{ github.event.pull_request.number }}) {
                    reviewThreads(first: 100) {
                      nodes { id path line isResolved isOutdated
                        comments(last: 10) { nodes { body createdAt author { login } } }
                      }
                    }
                  }
                }
              }'

            For each unresolved thread authored by any bot account
            (login ending in "[bot]" — treat all of these as this bot's
            own threads): if its last bot reply starts with "✅ Fixed", or
            no commit since that thread's last comment touched the
            relevant part of its file, skip it. Otherwise reply once,
            stating whether the flagged issue is now fixed (start with
            "✅ Fixed —" and cite the commit), partially fixed, or still
            present despite the changes.

            Never resolve threads. Read human-authored threads for
            context only. Then review the new/changed code as usual,
            without opening new threads for issues already tracked in
            existing ones.

            Finish with a summary comment. Use
            `gh pr comment --edit-last --create-if-none` so there is
            only ever one summary, updated in place on each push. It
            must contain:

            1. A short summary of what the PR does, plus a risk level
               (low / medium / high) with a one-line justification.
            2. "Remaining issues": a checkbox list with one item per
               finding — "- [ ]" while open, "- [x]" once fixed —
               covering both existing review threads and this review's
               new findings. If nothing is open, say so.

